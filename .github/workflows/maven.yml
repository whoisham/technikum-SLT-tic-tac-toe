name: Java CI/CD with Maven

on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Unit Tests
        run: mvn test

      # Dynamically updates <version> in pom.xml to match the release tag before packaging
      - name: Set Maven Project Version
        if: github.ref == 'refs/heads/main'
        run: |
          mvn versions:set -DnewVersion=1.0.${{ github.run_number }} -DgenerateBackupPoms=false

      - name: Build JAR
        if: github.ref == 'refs/heads/main'
        run: mvn package -DskipTests

      - name: Create GitHub Release and Upload JAR
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: |
            Automated game compilation build from main branch deployment.
            Project configured and compiled under version 1.0.${{ github.run_number }}.
          draft: false
          prerelease: false
          files: target/*.jar